{% extends 'base.html' %} {% block content %}

<h2>{{ titulo }}</h2>

<p>
  Registra um profissional (médico, enfermeiro ou farmacêutico) como autorizado
  a acessar este prontuário.
</p>

<form method="post">
  {% csrf_token %} {{ form.as_p }}

  <button type="submit">{{ botao }}</button>

  <a href="{% url 'prontuario:prontuario_detalhe' prontuario.idProntuario %}">
    Voltar para o prontuário
  </a>
</form>

{% endblock %}
